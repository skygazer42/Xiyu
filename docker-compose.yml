version: '3.8'

services:
  xiyu-clearvoice:
    build:
      context: .
      dockerfile: Dockerfile
    image: xiyu-speech-service:pytorch
    profiles: ["clearvoice"]
    container_name: xiyu-clearvoice
    ports:
      - "${PORT_CLEARVOICE:-8400}:8000"
    volumes:
      - ./data:/app/data
      # Persist ClearVoice checkpoints (ClearerVoice-Studio defaults to ./checkpoints/...).
      - ./data/models/clearvoice:/app/checkpoints
      - model-cache:/root/.cache/modelscope
      - huggingface-cache:/root/.cache/huggingface
      - ${CLEARVOICE_STUDIO_DIR:-/data/ClearerVoice-Studio/clearvoice}:${CLEARVOICE_STUDIO_DIR:-/data/ClearerVoice-Studio/clearvoice}:ro
    environment:
      - HF_ENDPOINT=${HF_ENDPOINT:-https://hf-mirror.com}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - ALL_PROXY=${ALL_PROXY:-}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1,::1}
      - DEVICE=${CLEARVOICE_DEVICE:-cpu}
      - NGPU=${CLEARVOICE_NGPU:-0}
      - NCPU=${CLEARVOICE_NCPU:-4}
      - CLEARVOICE_ENABLE=${CLEARVOICE_ENABLE:-true}
      - CLEARVOICE_STUDIO_DIR=${CLEARVOICE_STUDIO_DIR:-/data/ClearerVoice-Studio/clearvoice}
      - CLEARVOICE_MODEL=${CLEARVOICE_MODEL:-FRCRN_SE_16K}
      - CLEARVOICE_FORCE_CPU=${CLEARVOICE_FORCE_CPU:-true}
      - CLEARVOICE_CHUNK_DURATION_S=${CLEARVOICE_CHUNK_DURATION_S:-30.0}
      - CLEARVOICE_OVERLAP_DURATION_S=${CLEARVOICE_OVERLAP_DURATION_S:-0.5}
      - CLEARVOICE_SERVICE_MAX_DURATION_S=${CLEARVOICE_SERVICE_MAX_DURATION_S:-600.0}
      - CLEARVOICE_WARMUP_ON_STARTUP=${CLEARVOICE_WARMUP_ON_STARTUP:-false}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: ["python", "-m", "uvicorn", "src.clearvoice_service:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  xiyu-diarizer:
    build:
      context: .
      dockerfile: Dockerfile.diarizer
    image: xiyu-diarizer:pyannote
    profiles: ["diarizer"]
    container_name: xiyu-diarizer
    ports:
      - "${PORT_DIARIZER:-8300}:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - DEVICE=${DIARIZER_DEVICE:-cuda}
      - DIARIZER_MODEL=${DIARIZER_MODEL:-pyannote/speaker-diarization-3.1}
      - DIARIZER_WARMUP_ON_STARTUP=${DIARIZER_WARMUP_ON_STARTUP:-true}
      - DIARIZER_NUM_SPEAKERS=${DIARIZER_NUM_SPEAKERS:-}
      - DIARIZER_MIN_SPEAKERS=${DIARIZER_MIN_SPEAKERS:-}
      - DIARIZER_MAX_SPEAKERS=${DIARIZER_MAX_SPEAKERS:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  xiyu:
    build:
      context: .
      dockerfile: Dockerfile
    image: xiyu-speech-service:pytorch
    container_name: xiyu-service
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - model-cache:/root/.cache/modelscope
      - huggingface-cache:/root/.cache/huggingface
      # Optional: mount a local ClearerVoice-Studio checkout for ClearVoice denoise
      # (used when `asr_options.preprocess.denoise_backend=clearvoice`).
      - ${CLEARVOICE_STUDIO_DIR:-/data/ClearerVoice-Studio/clearvoice}:${CLEARVOICE_STUDIO_DIR:-/data/ClearerVoice-Studio/clearvoice}:ro
    environment:
      - DEVICE=${DEVICE:-cuda}
      - NGPU=${NGPU:-1}
      - NCPU=${NCPU:-4}
      - DEBUG=${DEBUG:-false}
      - HOTWORDS_THRESHOLD=${HOTWORDS_THRESHOLD:-0.85}
      # ClearVoice (optional)
      - CLEARVOICE_ENABLE=${CLEARVOICE_ENABLE:-true}
      - CLEARVOICE_STUDIO_DIR=${CLEARVOICE_STUDIO_DIR:-/data/ClearerVoice-Studio/clearvoice}
      - CLEARVOICE_MODEL=${CLEARVOICE_MODEL:-FRCRN_SE_16K}
      - CLEARVOICE_FORCE_CPU=${CLEARVOICE_FORCE_CPU:-true}
      - CLEARVOICE_CHUNK_DURATION_S=${CLEARVOICE_CHUNK_DURATION_S:-30.0}
      - CLEARVOICE_OVERLAP_DURATION_S=${CLEARVOICE_OVERLAP_DURATION_S:-0.5}
      # ClearVoice microservice (recommended)
      - CLEARVOICE_SERVICE_BASE_URL=${CLEARVOICE_SERVICE_BASE_URL:-http://xiyu-clearvoice:8000}
      - CLEARVOICE_SERVICE_TIMEOUT_S=${CLEARVOICE_SERVICE_TIMEOUT_S:-600.0}
      - CLEARVOICE_SERVICE_HEALTH_TIMEOUT_S=${CLEARVOICE_SERVICE_HEALTH_TIMEOUT_S:-2.0}
      - SPEAKER_UNSUPPORTED_BEHAVIOR=${SPEAKER_UNSUPPORTED_BEHAVIOR:-ignore}
      - SPEAKER_EXTERNAL_DIARIZER_ENABLE=${SPEAKER_EXTERNAL_DIARIZER_ENABLE:-false}
      - SPEAKER_EXTERNAL_DIARIZER_BASE_URL=${SPEAKER_EXTERNAL_DIARIZER_BASE_URL:-http://xiyu-diarizer:8000}
      - SPEAKER_EXTERNAL_DIARIZER_TIMEOUT_S=${SPEAKER_EXTERNAL_DIARIZER_TIMEOUT_S:-60}
      - SPEAKER_EXTERNAL_DIARIZER_MAX_TURNS=${SPEAKER_EXTERNAL_DIARIZER_MAX_TURNS:-200}
      - SPEAKER_EXTERNAL_DIARIZER_MAX_TURN_DURATION_S=${SPEAKER_EXTERNAL_DIARIZER_MAX_TURN_DURATION_S:-25}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

volumes:
  model-cache:
  huggingface-cache:
