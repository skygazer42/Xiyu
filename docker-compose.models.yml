# Multi-model deployment: each model/backend runs as its own Xiyu container,
# exposing the same Xiyu HTTP API on a different host port.
#
# This file is designed for *on-demand* startup via Compose profiles:
#   docker compose -f docker-compose.models.yml --profile pytorch up -d
#   docker compose -f docker-compose.models.yml --profile onnx up -d
#
# Or explicitly target a service (Compose will run it even if profiled):
#   docker compose -f docker-compose.models.yml up -d xiyu-pytorch
#
# Tip: use only one GPU-heavy profile at a time unless you have multiple GPUs/VRAM.

x-proxy-env: &proxy-env
  # Optional proxy passthrough for model downloads inside containers.
  # On macOS/Windows Docker Desktop, host loopback is usually `host.docker.internal`, not 127.0.0.1.
  # Optional HuggingFace endpoint mirror for weights download (e.g. https://hf-mirror.com).
  # If you want to use the official hub, set HF_ENDPOINT=https://huggingface.co in .env.
  HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  ALL_PROXY: ${ALL_PROXY:-}
  NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1}
  http_proxy: ${http_proxy:-}
  https_proxy: ${https_proxy:-}
  all_proxy: ${all_proxy:-}
  no_proxy: ${no_proxy:-localhost,127.0.0.1,::1}

x-xiyu-env: &xiyu-env
  <<: *proxy-env
  DEBUG: ${DEBUG:-false}
  HOTWORDS_THRESHOLD: ${HOTWORDS_THRESHOLD:-0.85}

  # Hotword files / injection behavior
  HOTWORDS_FILE: ${HOTWORDS_FILE:-hotwords.txt}
  HOTWORDS_CONTEXT_FILE: ${HOTWORDS_CONTEXT_FILE:-hotwords-context.txt}
  HOTWORD_INJECTION_ENABLE: ${HOTWORD_INJECTION_ENABLE:-true}
  HOTWORD_INJECTION_MAX: ${HOTWORD_INJECTION_MAX:-50}
  HOTWORD_WATCH_ENABLE: ${HOTWORD_WATCH_ENABLE:-true}
  HOTWORD_WATCH_DEBOUNCE: ${HOTWORD_WATCH_DEBOUNCE:-3.0}
  HOTWORD_USE_FAISS: ${HOTWORD_USE_FAISS:-false}
  HOTWORD_FAISS_INDEX_TYPE: ${HOTWORD_FAISS_INDEX_TYPE:-IVFFlat}

  # Text correction / pipeline
  CORRECTION_PIPELINE: ${CORRECTION_PIPELINE:-hotword,rules,pycorrector,post_process}
  TEXT_CORRECT_ENABLE: ${TEXT_CORRECT_ENABLE:-false}
  TEXT_CORRECT_BACKEND: ${TEXT_CORRECT_BACKEND:-kenlm}
  TEXT_CORRECT_DEVICE: ${TEXT_CORRECT_DEVICE:-cpu}
  CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.0}
  CONFIDENCE_FALLBACK: ${CONFIDENCE_FALLBACK:-pycorrector}

  # Text post-processing (CapsWriter-like)
  FILLER_REMOVE_ENABLE: ${FILLER_REMOVE_ENABLE:-false}
  FILLER_AGGRESSIVE: ${FILLER_AGGRESSIVE:-false}
  QJ2BJ_ENABLE: ${QJ2BJ_ENABLE:-true}
  ITN_ENABLE: ${ITN_ENABLE:-true}
  ITN_ERHUA_REMOVE: ${ITN_ERHUA_REMOVE:-false}
  SPACING_CJK_ASCII_ENABLE: ${SPACING_CJK_ASCII_ENABLE:-false}
  SPOKEN_PUNC_ENABLE: ${SPOKEN_PUNC_ENABLE:-false}
  ACRONYM_MERGE_ENABLE: ${ACRONYM_MERGE_ENABLE:-false}
  ZH_CONVERT_ENABLE: ${ZH_CONVERT_ENABLE:-false}
  ZH_CONVERT_LOCALE: ${ZH_CONVERT_LOCALE:-zh-hans}
  PUNC_CONVERT_ENABLE: ${PUNC_CONVERT_ENABLE:-false}
  PUNC_ADD_SPACE: ${PUNC_ADD_SPACE:-true}
  PUNC_RESTORE_ENABLE: ${PUNC_RESTORE_ENABLE:-false}
  PUNC_RESTORE_MODEL: ${PUNC_RESTORE_MODEL:-ct-punc-c}
  PUNC_MERGE_ENABLE: ${PUNC_MERGE_ENABLE:-false}
  TRASH_PUNC_ENABLE: ${TRASH_PUNC_ENABLE:-false}
  TRASH_PUNC_CHARS: ${TRASH_PUNC_CHARS:-，。,.}

  # LLM (OpenAI-compatible / Ollama / vLLM). Values come from `.env` for
  # multi-model deployments too; without passing these through, the container
  # would fall back to defaults (e.g. localhost Ollama) and features like
  # apply_llm / ensemble fusion won't work.
  LLM_ENABLE: ${LLM_ENABLE:-false}
  LLM_MODEL: ${LLM_MODEL:-qwen2.5:7b}
  LLM_BASE_URL: ${LLM_BASE_URL:-http://localhost:11434}
  LLM_API_KEY: ${LLM_API_KEY:-}
  LLM_BACKEND: ${LLM_BACKEND:-auto}
  LLM_ROLE: ${LLM_ROLE:-default}
  LLM_CONTEXT_SENTENCES: ${LLM_CONTEXT_SENTENCES:-1}
  LLM_FULLTEXT_ENABLE: ${LLM_FULLTEXT_ENABLE:-false}
  LLM_FULLTEXT_MAX_CHARS: ${LLM_FULLTEXT_MAX_CHARS:-2000}
  LLM_BATCH_SIZE: ${LLM_BATCH_SIZE:-5}
  LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-4096}
  LLM_CACHE_ENABLE: ${LLM_CACHE_ENABLE:-true}
  LLM_CACHE_SIZE: ${LLM_CACHE_SIZE:-1000}
  LLM_CACHE_TTL: ${LLM_CACHE_TTL:-3600}
  # Speaker diarization is backend-specific. For per-port deployments we prefer
  # "ignore" so non-speaker backends still return a normal transcript.
  SPEAKER_UNSUPPORTED_BEHAVIOR: ${SPEAKER_UNSUPPORTED_BEHAVIOR:-ignore}
  # External diarizer (pyannote) - when enabled, forces all backends to output speaker_turns.
  SPEAKER_EXTERNAL_DIARIZER_ENABLE: ${SPEAKER_EXTERNAL_DIARIZER_ENABLE:-false}
  SPEAKER_EXTERNAL_DIARIZER_BASE_URL: ${SPEAKER_EXTERNAL_DIARIZER_BASE_URL:-http://xiyu-diarizer:8000}
  SPEAKER_EXTERNAL_DIARIZER_TIMEOUT_S: ${SPEAKER_EXTERNAL_DIARIZER_TIMEOUT_S:-60}
  SPEAKER_EXTERNAL_DIARIZER_MAX_TURNS: ${SPEAKER_EXTERNAL_DIARIZER_MAX_TURNS:-200}
  SPEAKER_EXTERNAL_DIARIZER_MAX_TURN_DURATION_S: ${SPEAKER_EXTERNAL_DIARIZER_MAX_TURN_DURATION_S:-25}

  # ClearVoice (optional speech enhancement / denoise)
  CLEARVOICE_ENABLE: ${CLEARVOICE_ENABLE:-true}
  CLEARVOICE_STUDIO_DIR: ${CLEARVOICE_STUDIO_DIR:-/data/ClearerVoice-Studio/clearvoice}
  CLEARVOICE_MODEL: ${CLEARVOICE_MODEL:-FRCRN_SE_16K}
  CLEARVOICE_FORCE_CPU: ${CLEARVOICE_FORCE_CPU:-true}
  CLEARVOICE_CHUNK_DURATION_S: ${CLEARVOICE_CHUNK_DURATION_S:-30.0}
  CLEARVOICE_OVERLAP_DURATION_S: ${CLEARVOICE_OVERLAP_DURATION_S:-0.5}

  # Default runtime settings (can be overridden per-service).
  DEVICE: ${DEVICE:-cuda}
  NGPU: ${NGPU:-1}
  NCPU: ${NCPU:-4}

x-xiyu-volumes: &xiyu-volumes
  - ./data:/app/data
  - model-cache:/root/.cache/modelscope
  - huggingface-cache:/root/.cache/huggingface
  # Optional: mount a local ClearerVoice-Studio checkout for ClearVoice denoise.
  - ${CLEARVOICE_STUDIO_DIR:-/data/ClearerVoice-Studio/clearvoice}:${CLEARVOICE_STUDIO_DIR:-/data/ClearerVoice-Studio/clearvoice}:ro

x-xiyu-logging: &xiyu-logging
  driver: "json-file"
  options:
    max-size: "100m"
    max-file: "3"

x-xiyu-base: &xiyu-base
  build:
    context: .
    dockerfile: Dockerfile
  image: xiyu-speech-service:pytorch
  volumes: *xiyu-volumes
  restart: unless-stopped
  logging: *xiyu-logging

services:
  # =====================
  # External diarization
  # =====================
  xiyu-diarizer:
    build:
      context: .
      dockerfile: Dockerfile.diarizer
    image: xiyu-diarizer:pyannote
    profiles: ["diarizer", "all"]
    container_name: xiyu-diarizer
    ports:
      - "${PORT_DIARIZER:-8300}:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      <<: *proxy-env
      HF_TOKEN: ${HF_TOKEN:-}
      DEVICE: ${DIARIZER_DEVICE:-cuda}
      DIARIZER_MODEL: ${DIARIZER_MODEL:-pyannote/speaker-diarization-3.1}
      DIARIZER_WARMUP_ON_STARTUP: ${DIARIZER_WARMUP_ON_STARTUP:-true}
      # Optional: constrain expected speaker count for more stable diarization.
      # Priority: NUM_SPEAKERS > MIN/MAX.
      DIARIZER_NUM_SPEAKERS: ${DIARIZER_NUM_SPEAKERS:-}
      DIARIZER_MIN_SPEAKERS: ${DIARIZER_MIN_SPEAKERS:-}
      DIARIZER_MAX_SPEAKERS: ${DIARIZER_MAX_SPEAKERS:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    logging: *xiyu-logging

  # ======================
  # Local (in-process) ASR
  # ======================
  xiyu-pytorch:
    <<: *xiyu-base
    profiles: ["pytorch", "all"]
    container_name: xiyu-pytorch
    ports:
      - "${PORT_PYTORCH:-8101}:8000"
    environment:
      <<: *xiyu-env
      ASR_BACKEND: pytorch
      DEVICE: ${PYTORCH_DEVICE:-cuda}
      NGPU: ${PYTORCH_NGPU:-1}
      NCPU: ${PYTORCH_NCPU:-4}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  xiyu-onnx:
    # ONNX backend uses a dedicated Dockerfile with extra runtime deps.
    build:
      context: .
      dockerfile: Dockerfile.onnx
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-mirrors.aliyun.com}
    image: xiyu-speech-service:onnx
    profiles: ["onnx", "all"]
    container_name: xiyu-onnx
    ports:
      - "${PORT_ONNX:-8102}:8000"
    volumes:
      - ./data:/app/data
      - model-cache:/root/.cache/modelscope
      - huggingface-cache:/root/.cache/huggingface
      # Optional: mount a local ClearerVoice-Studio checkout for ClearVoice denoise.
      - ${CLEARVOICE_STUDIO_DIR:-/data/ClearerVoice-Studio/clearvoice}:${CLEARVOICE_STUDIO_DIR:-/data/ClearerVoice-Studio/clearvoice}:ro
      - onnx-cache:/root/.cache/funasr_onnx
    environment:
      <<: *xiyu-env
      ASR_BACKEND: onnx
      DEVICE: ${ONNX_DEVICE:-cpu}
      NGPU: ${ONNX_NGPU:-0}
      NCPU: ${ONNX_NCPU:-8}
      OMP_NUM_THREADS: ${ONNX_NCPU:-8}
      MKL_NUM_THREADS: ${ONNX_NCPU:-8}
    restart: unless-stopped
    logging: *xiyu-logging

  xiyu-sensevoice:
    <<: *xiyu-base
    profiles: ["sensevoice", "all"]
    container_name: xiyu-sensevoice
    ports:
      - "${PORT_SENSEVOICE:-8103}:8000"
    environment:
      <<: *xiyu-env
      ASR_BACKEND: sensevoice
      DEVICE: ${SENSEVOICE_DEVICE:-cuda}
      NGPU: ${SENSEVOICE_NGPU:-1}
      NCPU: ${SENSEVOICE_NCPU:-4}
      SENSEVOICE_MODEL: ${SENSEVOICE_MODEL:-iic/SenseVoiceSmall}
      SENSEVOICE_LANGUAGE: ${SENSEVOICE_LANGUAGE:-zh}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  xiyu-whisper:
    <<: *xiyu-base
    profiles: ["whisper", "all"]
    container_name: xiyu-whisper
    ports:
      - "${PORT_WHISPER:-8105}:8000"
    environment:
      <<: *xiyu-env
      ASR_BACKEND: whisper
      DEVICE: ${WHISPER_DEVICE:-cuda}
      NGPU: ${WHISPER_NGPU:-1}
      NCPU: ${WHISPER_NCPU:-4}
      # Whisper's `initial_prompt` is best-effort and can sometimes get
      # hallucinated into the transcript. Keep hotword correction enabled
      # (apply_hotword), but disable forward-injection for this backend.
      HOTWORD_INJECTION_ENABLE: "false"
      WHISPER_MODEL: ${WHISPER_MODEL:-large}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-zh}
      WHISPER_DOWNLOAD_ROOT: ${WHISPER_DOWNLOAD_ROOT:-/app/data/models/whisper}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  xiyu-gguf:
    # GGUF backend requires extra Python deps (onnxruntime + gguf) and
    # model artifacts under ./data/models. See README for expected files.
    build:
      context: .
      dockerfile: Dockerfile.gguf
      args:
        # If GitHub access is unstable/blocked, set LLAMA_CPP_REPO to an internal mirror:
        #   LLAMA_CPP_REPO=https://gitee.com/mirrors/llama.cpp.git docker compose ... build xiyu-gguf
        LLAMA_CPP_REPO: ${LLAMA_CPP_REPO:-https://github.com/ggml-org/llama.cpp.git}
        # Fallback mirror used when the primary repo is unreachable.
        # Set to empty to disable the fallback.
        LLAMA_CPP_REPO_FALLBACK: ${LLAMA_CPP_REPO_FALLBACK:-https://gitee.com/mirrors/llama.cpp.git}
        LLAMA_CPP_REF: ${LLAMA_CPP_REF:-}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-mirrors.aliyun.com}
    image: xiyu-speech-service:gguf
    profiles: ["gguf", "all"]
    container_name: xiyu-gguf
    ports:
      - "${PORT_GGUF:-8104}:8000"
    volumes: *xiyu-volumes
    environment:
      <<: *xiyu-env
      ASR_BACKEND: gguf
      DEVICE: ${GGUF_DEVICE:-cpu}
      NGPU: ${GGUF_NGPU:-0}
      NCPU: ${GGUF_NCPU:-8}
      # GGUF backend injects audio embeddings into a GGUF decoder with a fixed
      # context window; long chunks can trigger a hard llama.cpp assert and
      # crash the whole process. Keep chunks short by default.
      # Also increase llama.cpp n_ctx/n_batch so typical meeting chunks fit.
      GGUF_N_CTX: ${GGUF_N_CTX:-8192}
      GGUF_N_BATCH: ${GGUF_N_BATCH:-8192}
      VAD_MAX_SEGMENT_MS: ${GGUF_VAD_MAX_SEGMENT_MS:-15000}
      # GGUF backend does not support native diarization and is more fragile
      # under many short chunks. Keep speaker off for this backend even if the
      # global env enables external diarizer.
      SPEAKER_EXTERNAL_DIARIZER_ENABLE: "false"
      SPEAKER_EXTERNAL_DIARIZER_MAX_TURN_DURATION_S: ${GGUF_SPEAKER_MAX_TURN_DURATION_S:-10}
      # Preferred layout: /app/data/models/Fun-ASR-Nano-GGUF/*
      # (Backwards compatible: the GGUF backend will also search /app/data/models/).
      # Prefer int8 encoder on CPU to avoid fp16 CPU NaNs on some kernels.
      GGUF_ENCODER_PATH: ${GGUF_ENCODER_PATH:-/app/data/models/Fun-ASR-Nano-GGUF/Fun-ASR-Nano-Encoder-Adaptor.int8.onnx}
      GGUF_CTC_PATH: ${GGUF_CTC_PATH:-/app/data/models/Fun-ASR-Nano-GGUF/Fun-ASR-Nano-CTC.int8.onnx}
      GGUF_DECODER_PATH: ${GGUF_DECODER_PATH:-/app/data/models/Fun-ASR-Nano-GGUF/Fun-ASR-Nano-Decoder.q8_0.gguf}
      GGUF_TOKENS_PATH: ${GGUF_TOKENS_PATH:-/app/data/models/Fun-ASR-Nano-GGUF/tokens.txt}
      # Default llama.cpp shared libs are bundled into the GGUF image under /app/llama_cpp/lib.
      # If you prefer to provide your own builds, set GGUF_LIB_DIR=/app/data/models/bin and
      # put the .so files into ./data/models/bin on the host.
      GGUF_LIB_DIR: ${GGUF_LIB_DIR:-/app/llama_cpp/lib}

  # ==========================
  # Remote ASR (OpenAI-style)
  # ==========================
  # These two services run the remote ASR servers. They are optional and only
  # started when enabling their profiles. Xiyu wrappers below expose a unified
  # Xiyu API for each model.
  qwen3-asr:
    image: ${QWEN3_ASR_IMAGE:-qwenllm/qwen3-asr:latest}
    profiles: ["qwen3", "router", "all"]
    container_name: qwen3-asr
    # Expose for debugging (Xiyu talks via the docker network name).
    ports:
      - "${PORT_QWEN3_ASR:-9001}:8000"
    ipc: host
    volumes:
      - huggingface-cache:/root/.cache/huggingface
      - modelscope-cache:/root/.cache/modelscope
      - ./docker/remote-asr/start_qwen3_asr.sh:/start_qwen3_asr.sh:ro
    command:
      [
        "bash",
        "-lc",
        "tr -d '\\r' < /start_qwen3_asr.sh > /tmp/start_qwen3_asr.sh && chmod +x /tmp/start_qwen3_asr.sh && bash /tmp/start_qwen3_asr.sh",
      ]
    shm_size: "4gb"
    environment:
      <<: *proxy-env
      # Optional: PyPI mirror for installing ModelScope inside the container.
      PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}
      PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-mirrors.aliyun.com}
      QWEN3_MODEL_ID: ${QWEN3_MODEL_ID:-Qwen/Qwen3-ASR-0.6B}
      # Optional: point to a local model directory inside the container to avoid downloading.
      # Example: QWEN3_MODEL_PATH=/root/.cache/modelscope/hub/models/Qwen/Qwen3-ASR-0___6B
      QWEN3_MODEL_PATH: ${QWEN3_MODEL_PATH:-}
      # vLLM max context length. The upstream default is 65536, which can require
      # a large KV cache. Use a smaller default so Qwen3-ASR can co-exist with
      # other GPU services (e.g. VibeVoice) on a single card.
      # vLLM KV cache scales with max_model_len. Use a conservative default so
      # Qwen3-ASR can co-exist with other GPU services (e.g. VibeVoice) on a
      # single card. Override in `.env` if you have plenty of VRAM.
      QWEN3_MAX_MODEL_LEN: ${QWEN3_MAX_MODEL_LEN:-16384}
      PORT: 8000
      GPU_MEMORY_UTILIZATION: ${QWEN3_GPU_MEMORY_UTILIZATION:-0.75}
      MODEL_SOURCE: ${MODEL_SOURCE:-modelscope}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  vibevoice-asr:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:latest}
    profiles: ["vibevoice", "router", "all"]
    container_name: vibevoice-asr
    ports:
      - "${PORT_VIBEVOICE_ASR:-9002}:8000"
    ipc: host
    volumes:
      # Mount a local VibeVoice repo directory that contains vllm_plugin + python package.
      # Default: use the vendored snapshot under ./third_party/VibeVoice.
      - ${VIBEVOICE_REPO_PATH:-./third_party/VibeVoice}:/app
      - huggingface-cache:/root/.cache/huggingface
      - modelscope-cache:/root/.cache/modelscope
      - ./docker/remote-asr/start_vibevoice_asr.sh:/start_vibevoice_asr.sh:ro
    entrypoint: ["bash", "-lc"]
    command:
      [
        "tr -d '\\r' < /start_vibevoice_asr.sh > /tmp/start_vibevoice_asr.sh && chmod +x /tmp/start_vibevoice_asr.sh && bash /tmp/start_vibevoice_asr.sh",
      ]
    shm_size: "4gb"
    environment:
      <<: *proxy-env
      # Optional: use a PyPI mirror inside the container for installing the mounted VibeVoice package.
      PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}
      PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-mirrors.aliyun.com}
      VIBEVOICE_MODEL_ID: ${VIBEVOICE_MODEL_ID:-microsoft/VibeVoice-ASR}
      # Optional: point to a local model directory inside the container to avoid downloading.
      # Example: VIBEVOICE_MODEL_PATH=/root/.cache/modelscope/hub/models/microsoft/VibeVoice-ASR
      VIBEVOICE_MODEL_PATH: ${VIBEVOICE_MODEL_PATH:-}
      PORT: 8000
      SERVED_MODEL_NAME: ${VIBEVOICE_SERVED_MODEL_NAME:-vibevoice}
      DTYPE: ${VIBEVOICE_DTYPE:-float16}
      # Conservative defaults so VibeVoice can co-exist with other GPU backends
      # on a single 48GB card (tune in `.env` if you have spare VRAM).
      MAX_MODEL_LEN: ${VIBEVOICE_MAX_MODEL_LEN:-8192}
      MAX_NUM_SEQS: ${VIBEVOICE_MAX_NUM_SEQS:-1}
      MAX_NUM_BATCHED_TOKENS: ${VIBEVOICE_MAX_NUM_BATCHED_TOKENS:-2048}
      GPU_MEMORY_UTILIZATION: ${VIBEVOICE_GPU_MEMORY_UTILIZATION:-0.45}
      VIBEVOICE_FFMPEG_MAX_CONCURRENCY: ${VIBEVOICE_FFMPEG_MAX_CONCURRENCY:-16}
      MODEL_SOURCE: ${MODEL_SOURCE:-modelscope}
      PYTORCH_ALLOC_CONF: expandable_segments:True
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  xiyu-qwen3:
    <<: *xiyu-base
    profiles: ["qwen3", "all"]
    container_name: xiyu-qwen3
    ports:
      - "${PORT_XIYU_QWEN3:-8201}:8000"
    environment:
      <<: *xiyu-env
      ASR_BACKEND: qwen3
      DEVICE: ${QWEN3_WRAPPER_DEVICE:-cpu}
      NGPU: ${QWEN3_WRAPPER_NGPU:-0}
      NCPU: ${QWEN3_WRAPPER_NCPU:-4}
      QWEN3_ASR_BASE_URL: http://qwen3-asr:8000
      QWEN3_ASR_MODEL: ${QWEN3_MODEL_ID:-Qwen/Qwen3-ASR-0.6B}
      QWEN3_ASR_API_KEY: ${QWEN3_ASR_API_KEY:-EMPTY}
      QWEN3_ASR_TIMEOUT_S: ${QWEN3_ASR_TIMEOUT_S:-60}
      # Optional: speaker fallback diarization via a helper Xiyu service (e.g. xiyu-pytorch).
      # Enables "说话人1/2/3" output even when Qwen3-ASR itself doesn't support diarization.
      SPEAKER_FALLBACK_DIARIZATION_ENABLE: ${SPEAKER_FALLBACK_DIARIZATION_ENABLE:-false}
      SPEAKER_FALLBACK_DIARIZATION_BASE_URL: ${SPEAKER_FALLBACK_DIARIZATION_BASE_URL:-http://xiyu-pytorch:8000}
      SPEAKER_FALLBACK_DIARIZATION_TIMEOUT_S: ${SPEAKER_FALLBACK_DIARIZATION_TIMEOUT_S:-30}
      SPEAKER_FALLBACK_MAX_TURN_DURATION_S: ${SPEAKER_FALLBACK_MAX_TURN_DURATION_S:-25}
      SPEAKER_FALLBACK_MAX_TURNS: ${SPEAKER_FALLBACK_MAX_TURNS:-200}
    depends_on:
      - qwen3-asr

  xiyu-vibevoice:
    <<: *xiyu-base
    profiles: ["vibevoice", "all"]
    container_name: xiyu-vibevoice
    ports:
      - "${PORT_XIYU_VIBEVOICE:-8202}:8000"
    environment:
      <<: *xiyu-env
      ASR_BACKEND: vibevoice
      DEVICE: ${VIBEVOICE_WRAPPER_DEVICE:-cpu}
      NGPU: ${VIBEVOICE_WRAPPER_NGPU:-0}
      NCPU: ${VIBEVOICE_WRAPPER_NCPU:-4}
      VIBEVOICE_ASR_BASE_URL: http://vibevoice-asr:8000
      VIBEVOICE_ASR_MODEL: ${VIBEVOICE_SERVED_MODEL_NAME:-vibevoice}
      VIBEVOICE_ASR_API_KEY: ${VIBEVOICE_ASR_API_KEY:-EMPTY}
      VIBEVOICE_ASR_TIMEOUT_S: ${VIBEVOICE_ASR_TIMEOUT_S:-600}
      VIBEVOICE_ASR_USE_CHAT_COMPLETIONS_FALLBACK: ${VIBEVOICE_ASR_USE_CHAT_COMPLETIONS_FALLBACK:-true}
    depends_on:
      - vibevoice-asr

  xiyu-router:
    <<: *xiyu-base
    profiles: ["router"]
    container_name: xiyu-router
    ports:
      - "${PORT_XIYU_ROUTER:-8200}:8000"
    environment:
      <<: *xiyu-env
      ASR_BACKEND: router
      DEVICE: ${ROUTER_DEVICE:-cpu}
      NGPU: ${ROUTER_NGPU:-0}
      NCPU: ${ROUTER_NCPU:-4}
      QWEN3_ASR_BASE_URL: http://qwen3-asr:8000
      QWEN3_ASR_MODEL: ${QWEN3_MODEL_ID:-Qwen/Qwen3-ASR-0.6B}
      VIBEVOICE_ASR_BASE_URL: http://vibevoice-asr:8000
      VIBEVOICE_ASR_MODEL: ${VIBEVOICE_SERVED_MODEL_NAME:-vibevoice}
      VIBEVOICE_ASR_USE_CHAT_COMPLETIONS_FALLBACK: ${VIBEVOICE_ASR_USE_CHAT_COMPLETIONS_FALLBACK:-true}
      # Keep Router usable when VibeVoice is not running (e.g. to save VRAM).
      # You can still enable VibeVoice by starting `vibevoice-asr` and setting:
      #   ROUTER_LONG_BACKEND=vibevoice
      #   ROUTER_FORCE_VIBEVOICE_WHEN_WITH_SPEAKER=true
      ROUTER_SHORT_BACKEND: ${ROUTER_SHORT_BACKEND:-qwen3}
      ROUTER_LONG_BACKEND: ${ROUTER_LONG_BACKEND:-qwen3}
      ROUTER_LONG_AUDIO_THRESHOLD_S: ${ROUTER_LONG_AUDIO_THRESHOLD_S:-60}
      ROUTER_FORCE_VIBEVOICE_WHEN_WITH_SPEAKER: ${ROUTER_FORCE_VIBEVOICE_WHEN_WITH_SPEAKER:-false}
    depends_on:
      - qwen3-asr

volumes:
  model-cache:
  huggingface-cache:
  modelscope-cache:
  onnx-cache:
